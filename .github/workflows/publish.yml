name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type to publish
        required: true
        default: stable
        type: choice
        options:
          - stable
          - prerelease

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: release

    permissions:
      contents: write
      id-token: write

    concurrency:
      group: publish-packages
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish with lerna
        run: |
          if [[ "${{ github.event.inputs.release_type }}" == "prerelease" ]]; then
            pnpm run publish:pre -- --yes --access public --provenance
          else
            pnpm run publish -- --yes --access public --provenance
          fi

      - name: Push release commit and tags
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin --tags
